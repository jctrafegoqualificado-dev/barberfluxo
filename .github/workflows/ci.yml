name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: TypeScript & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint .

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: check

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://ci:ci@localhost:5432/ci' }}
      JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-placeholder-jwt-secret-32-chars-ok' }}
      NEXTAUTH_URL: 'http://localhost:3000'
      CRON_SECRET: 'placeholder'
      PUBLIC_API_KEY: 'placeholder'
      MERCADOPAGO_ACCESS_TOKEN: 'TEST-placeholder'
      NEXT_PUBLIC_MERCADOPAGO_PUBLIC_KEY: 'TEST-placeholder'
      EVOLUTION_API_URL: 'https://placeholder.evolution.com'
      EVOLUTION_SERVER_URL: 'https://placeholder.evolution.com'
      EVOLUTION_GLOBAL_API_KEY: 'placeholder'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
